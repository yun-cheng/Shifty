name: Build DMG

on:
  push:
    tags:
      - '20[0-9][0-9].[0-9][0-9].[0-9][0-9].[0-9]*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select --switch /Applications/Xcode.app/Contents/Developer

      - name: Build (Release)
        run: |
          xcodebuild -workspace Shifty.xcworkspace \
            -scheme Shifty \
            -configuration Release \
            build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGN_STYLE=Manual \
            ENABLE_HARDENED_RUNTIME=NO \
            MACOSX_DEPLOYMENT_TARGET=13.0

      - name: Find built app
        id: find_app
        run: |
          APP=$(find ~/Library/Developer/Xcode/DerivedData \
            -name "Shifty.app" -path "*/Release/*" | head -1)
          echo "path=$APP" >> "$GITHUB_OUTPUT"

      - name: Create DMG
        run: |
          APPPATH="${{ steps.find_app.outputs.path }}"
          TMPDIR=$(mktemp -d)
          cp -R "$APPPATH" "$TMPDIR/Shifty.app"
          ln -s /Applications "$TMPDIR/Applications"
          hdiutil create -volname "Shifty" \
            -srcfolder "$TMPDIR" \
            -ov -format UDZO \
            "Shifty.dmg"
          rm -rf "$TMPDIR"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: Shifty.dmg
          generate_release_notes: true